name: Node checks

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RecoverySys
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: RecoverySys/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          E2E_ARTIFACT_ONLY: '1'
      - name: Upload E2E evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-pr-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            RecoverySys/playwright-report/
            RecoverySys/test-results/
