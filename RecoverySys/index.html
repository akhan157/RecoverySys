<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecoverySys</title>
    <!-- Apply saved theme before first paint to prevent flash of light mode.
         Falls back to OS prefers-color-scheme when no explicit preference is stored. -->
    <script>(function(){try{var t=localStorage.getItem('recoverysys-theme');if(t==='dark'||(t==null&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})()</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Pre-hydration shell — React replaces #root on mount. These styles are
         only active until the app boots; once it does, our full stylesheet
         takes over and this is inert. Keeps perceived load near-instant. -->
    <style>
      html, body { margin: 0; padding: 0; font-family: 'JetBrains Mono', ui-monospace, monospace; -webkit-font-smoothing: antialiased; }
      /* Dark skeleton defaults — used when data-theme="dark" OR on any first load
         (the pre-paint theme script sets the attribute before this parses). */
      html { background: #0a0a0a; color: #e0e0e0; }
      html:not([data-theme="dark"]) { background: #f4f5f7; color: #1a1d23; }
      html:not([data-theme="dark"]) .s-header { border-bottom-color: #dde1e9; }
      html:not([data-theme="dark"]) .s-pane { border-right-color: #dde1e9; border-bottom-color: #dde1e9; }
      html:not([data-theme="dark"]) .s-statusbar { border-top-color: #dde1e9; color: #8b8f9a; }
      html:not([data-theme="dark"]) .s-brand { color: #1a1d23; }
      html:not([data-theme="dark"]) .s-tab { color: #8b8f9a; }
      html:not([data-theme="dark"]) .s-tab:first-child { color: #1a1d23; border-bottom-color: #1a1d23; }
      html:not([data-theme="dark"]) .s-skel,
      html:not([data-theme="dark"]) .s-skel.grid > div { background: #e8eaed; border-color: #dde1e9; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .s-header { height: 48px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; padding: 0 20px; gap: 24px; flex-shrink: 0; }
      .s-brand { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
      .s-tabs { display: flex; gap: 0; margin-left: 24px; }
      .s-tab { padding: 14px 18px; font-size: 11px; letter-spacing: 0.06em; color: #888; }
      .s-tab:first-child { color: #fff; border-bottom: 2px solid #fff; }
      .s-body { flex: 1; display: grid; grid-template-columns: 360px 1fr 280px; min-height: 0; }
      .s-pane { border-right: 1px solid #2a2a2a; padding: 16px; }
      .s-pane:last-child { border-right: none; }
      .s-label { font-size: 10px; color: #555; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
      .s-skel { background: #151515; border: 1px solid #2a2a2a; border-radius: 4px; height: 28px; margin-bottom: 6px; animation: s-pulse 1.4s ease-in-out infinite; }
      .s-skel.tall { height: 56px; }
      .s-skel.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; height: auto; background: none; border: none; padding: 0; animation: none; }
      .s-skel.grid > div { background: #151515; border: 1px solid #2a2a2a; border-radius: 4px; height: 72px; animation: s-pulse 1.4s ease-in-out infinite; }
      .s-statusbar { height: 28px; border-top: 1px solid #2a2a2a; padding: 0 16px; display: flex; align-items: center; gap: 24px; font-size: 10px; color: #555; letter-spacing: 0.04em; flex-shrink: 0; }
      @keyframes s-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      @media (max-width: 1024px) { .s-body { grid-template-columns: 1fr; } .s-pane { border-right: none; border-bottom: 1px solid #2a2a2a; } }
      @media (max-width: 640px) { .s-header { padding: 0 12px; } .s-brand { font-size: 10px; } .s-tab { padding: 14px 10px; font-size: 10px; } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Skeleton UI — replaced by React on mount. Mirrors MissionControlLayout. -->
      <div class="s-header">
        <span class="s-brand">RECOVERYSYS_V1.1</span>
        <nav class="s-tabs">
          <span class="s-tab">DASHBOARD</span>
          <span class="s-tab">SIMULATION</span>
          <span class="s-tab">DISPERSION</span>
          <span class="s-tab">SPECS</span>
          <span class="s-tab">EXPORT</span>
        </nav>
      </div>
      <div class="s-body">
        <aside class="s-pane">
          <div class="s-label">PARTS_CATALOG_EXPLORER</div>
          <div class="s-skel"></div>
          <div class="s-skel"></div>
          <div class="s-skel"></div>
          <div class="s-skel"></div>
          <div class="s-skel"></div>
          <div class="s-skel tall"></div>
        </aside>
        <main class="s-pane">
          <div class="s-label">BAY_SCHEMATIC_REALTIME_RENDER</div>
          <div class="s-skel grid">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
          </div>
        </main>
        <aside class="s-pane">
          <div class="s-label">CONFIG_SUMMARY</div>
          <div class="s-skel tall"></div>
          <div class="s-skel tall"></div>
          <div class="s-skel"></div>
        </aside>
      </div>
      <div class="s-statusbar">
        <span>▶ RUN_SIM</span>
        <span>MOTOR: —</span>
        <span>DESCENT_RATE: —</span>
        <span>DRIFT: —</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
