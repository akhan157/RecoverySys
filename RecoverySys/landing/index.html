<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RecoverySys — Recovery Bay Configuration + Flight Simulation</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Browser tool for L1/L2/L3 high-power rocketry. Configure a recovery bay, simulate the flight, and plot landing dispersion. Free. No account." />
<!-- Content Security Policy. 'unsafe-inline' + 'unsafe-eval' on script-src
     are required by @babel/standalone (compiles JSX in the browser) and the
     inline bootstrap scripts below. Dropping @babel/standalone in favor of
     pre-compiled JSX is a follow-up — that lets us tighten this further. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;" />
<link rel="stylesheet" href="assets/colors_and_type.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #050505; }
  body { overflow-x: hidden; }
  #root { width: 100vw; }
  :root { --lp-heading-font: 'Space Grotesk', sans-serif; }
</style>
<!-- SRI integrity hashes (sha384) for every external script — fail-closed
     if a CDN is compromised. crossorigin=anonymous required for SRI to
     actually be enforced on cross-origin loads. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" integrity="sha384-Z3REaz79l2IaAZqJsSABtTbhjgOUYyV3p90XNnAPCSHg3EMTz1fouunq9WZRtj3d" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js" integrity="sha384-O55L/6rhHr9CFvrxqv5luxOCcmVaBmETbZbJDP+Do8T0pztTACsFBD/IXCNkj7DV" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>
  // Baked-in chart preferences (area variant, green palette)
  window.__LP_CHART_VARIANT = 'area';
  window.__LP_CHART_PALETTE = 'green';
</script>
<script type="text/babel" src="assets/landing-scroll-styles.jsx"></script>
<script type="text/babel" src="assets/flight-chart.jsx"></script>
<script type="text/babel" src="assets/landing-scroll.jsx"></script>

<script>
  // Smooth scroll via Lenis, driven by GSAP's ticker and synced with ScrollTrigger.
  (function () {
    if (!window.Lenis || !window.gsap || !window.ScrollTrigger) return;
    const lenis = new Lenis({
      duration: 1.15,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smoothWheel: true,
      wheelMultiplier: 1.0,
      touchMultiplier: 1.2,
    });
    window.__lenis = lenis;
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => lenis.raf(time * 1000));
    gsap.ticker.lagSmoothing(0);
  })();
</script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<LPScroll />);
</script>
</body>
</html>
